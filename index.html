<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GEROT UTR – SMG1</title>
<style>
  :root {
    --yellow: #FFE600;
    --green: #43a047;
    --green-bg: #f1f8f1;
    --red: #e53935;
    --red-bg: #fff5f5;
    --amber: #f9a825;
    --amber-bg: #fffbf0;
    --gray: #888;
    --bg: #f0f2f5;
    --card-bg: #fff;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: var(--yellow);
    padding: 14px 16px 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .logo-area { display: flex; align-items: center; gap: 10px; }
  .logo { width: 36px; height: 36px; background: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--yellow); font-size: 14px; flex-shrink: 0; }
  .title { font-size: 16px; font-weight: 800; color: #1a1a1a; line-height: 1.2; }
  .subtitle { font-size: 11px; color: #555; }
  .header-date { text-align: right; }
  .date-display { font-size: 15px; font-weight: 800; color: #1a1a1a; }
  .date-weekday { font-size: 10px; color: #666; margin-top: 1px; }

  /* ── DATE SELECTOR ── */
  .date-bar {
    background: #fff;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #e8e8e8;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .date-bar::-webkit-scrollbar { display: none; }
  .date-label { font-size: 11px; font-weight: 600; color: #888; white-space: nowrap; flex-shrink: 0; }
  .date-chips { display: flex; gap: 6px; }
  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: #f8f8f8;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .chip.active {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #fff;
  }
  .chip:active { transform: scale(0.96); }

  /* ── SUMMARY PILL ROW ── */
  .summary-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .summary-row::-webkit-scrollbar { display: none; }
  .pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pill-green { background: var(--green-bg); color: #2e7d32; }
  .pill-red { background: var(--red-bg); color: #c62828; }
  .pill-amber { background: var(--amber-bg); color: #e65100; }

  /* ── MAIN CONTENT ── */
  .content { padding: 12px 16px 24px; display: flex; flex-direction: column; gap: 12px; }

  /* ── SECTION ── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    padding: 0 2px;
    margin-bottom: 6px;
    margin-top: 4px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border-left: 5px solid transparent;
    position: relative;
  }
  .card-green { border-left-color: var(--green); }
  .card-red { border-left-color: var(--red); }
  .card-amber { border-left-color: var(--amber); }

  .card-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .icon-green { background: var(--green-bg); }
  .icon-red { background: var(--red-bg); }
  .icon-amber { background: var(--amber-bg); }

  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px; }
  .card-value { font-size: 24px; font-weight: 800; color: #1a1a1a; line-height: 1.1; }
  .card-value.pending { font-size: 18px; color: #bbb; }
  .card-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
  .card-preview-tag {
    display: inline-block;
    background: #fff3cd;
    color: #e65100;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 5px;
    vertical-align: middle;
    letter-spacing: 0.3px;
  }

  .card-status { font-size: 20px; flex-shrink: 0; }

  /* ── 2-col grid for Profitability ── */
  .cards-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cards-2col .card { flex-direction: column; align-items: flex-start; gap: 8px; padding: 12px 14px; }
  .cards-2col .card-icon { width: 34px; height: 34px; font-size: 16px; border-radius: 8px; }
  .cards-2col .card-value { font-size: 20px; }
  .cards-2col .card-top { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .cards-2col .card-status { font-size: 16px; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }

  /* ── FOOTER ── */
  .footer { text-align: center; padding: 12px 16px 8px; font-size: 10px; color: #bbb; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-area">
      <div class="logo">ML</div>
      <div>
        <div class="title">GEROT UTR – SMG1</div>
        <div class="subtitle">KPIs Diários · SVC</div>
      </div>
    </div>
    <div class="header-date">
      <div class="date-display" id="hdrDate">—</div>
      <div class="date-weekday" id="hdrWeekday">—</div>
    </div>
  </div>
</div>

<!-- DATE SELECTOR -->
<div class="date-bar">
  <div class="date-label">Data:</div>
  <div class="date-chips" id="dateChips"></div>
</div>

<!-- SUMMARY PILLS -->
<div class="summary-row" id="summaryRow"></div>

<!-- MAIN CONTENT -->
<div class="content" id="content"></div>

<div class="footer">Fonte: Tableau Cloud &amp; Planilha Operacional &nbsp;·&nbsp; GEROT UTR SMG1</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const HISTORY = [
  {
    date: "31/05/2026",
    abs: 16.98,
    lms: 76.84,
    cia: 15.38,
    coa: 10.39,
    spr: 80.39,
    delay: null,
    oot_svc: 94.51,
    tmc: 45.77,
    delivery: 88.71,
    fag: 58.67,
    oot_waves: 80.17,
    dit: 741,
    previews: []
  },
  {
    date: "01/06/2026",
    abs: 9.89,
    lms: 82.24,
    cia: 10.40,
    coa: 6.49,
    spr: 65.58,
    delay: 33.33,
    oot_svc: 83.66,
    tmc: 45.57,
    delivery: 21.72,
    fag: 49.13,
    oot_waves: null,
    dit: null,
    previews: ["oot_svc"]
  }
];

// ── KPI DEFINITIONS ──────────────────────────────────────────────────────────
const KPIS = [
  // People
  { id: "abs",       name: "Absenteísmo",        icon: "👤", section: "people",        meta: "Meta: ≤ 4%",     fmt: pct,  check: v => v <= 4 },
  // Profitability
  { id: "lms",       name: "Utilização LMS",      icon: "📊", section: "profitability", meta: "Meta: ≥ 80%",    fmt: pct,  check: v => v >= 80 },
  { id: "cia",       name: "%CIA",                icon: "📉", section: "profitability", meta: "Meta: ≤ 5%",     fmt: pct,  check: v => v <= 5 },
  { id: "coa",       name: "%COA",                icon: "📉", section: "profitability", meta: "Meta: ≤ 5%",     fmt: pct,  check: v => v <= 5 },
  { id: "spr",       name: "SPR LM",              icon: "⚡", section: "profitability", meta: "Meta: ≥ 67,58",  fmt: num,  check: v => v >= 67.58 },
  // Experience
  { id: "dit",       name: "DIT – Pcts Acum.",    icon: "📦", section: "experience",   meta: "Meta: < 500 pcts", fmt: int, check: v => v < 500 },
  { id: "delay",     name: "Delay (Cause SVC)",   icon: "⏱️", section: "experience",   meta: "Meta: ≤ 4%",     fmt: pct,  check: v => v <= 4, pendentIfZero: true },
  { id: "oot_svc",   name: "OOT SVC (OpsClock)",  icon: "🕐", section: "experience",   meta: "Meta: ≥ 85%",    fmt: pct,  check: v => v >= 85 },
  { id: "tmc",       name: "TMC (Cumprimento)",   icon: "🚚", section: "experience",   meta: "Meta: ≥ 83%",    fmt: pct,  check: v => v >= 83 },
  { id: "delivery",  name: "Delivery Success",    icon: "✉️", section: "experience",   meta: "Meta: ≥ 98,1%",  fmt: pct,  check: v => v >= 98.1 },
  { id: "fag",       name: "Fechamento Auto.",     icon: "🔒", section: "experience",   meta: "Meta: ≥ 70%",    fmt: pct,  check: v => v >= 70 },
  { id: "oot_waves", name: "OOT Waves 3.0",       icon: "🌊", section: "experience",   meta: "Meta: ≥ 85%",    fmt: pct,  check: v => v >= 85 },
];

function pct(v)  { return (v).toFixed(2).replace(".", ",") + "%"; }
function num(v)  { return v.toFixed(2).replace(".", ","); }
function int(v)  { return Math.round(v).toLocaleString("pt-BR"); }

const WEEKDAYS = ["Domingo","Segunda-Feira","Terça-Feira","Quarta-Feira","Quinta-Feira","Sexta-Feira","Sábado"];
const MONTHS   = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

function parseDate(str) {
  const [d, m, y] = str.split("/").map(Number);
  return new Date(y, m - 1, d);
}

// ── STATE ────────────────────────────────────────────────────────────────────
let selectedIdx = HISTORY.length - 1;

// ── RENDER ───────────────────────────────────────────────────────────────────
function cardStatus(isOk, isPending) {
  if (isPending) return { emoji: "⏳", cls: "card-amber", iconCls: "icon-amber" };
  return isOk
    ? { emoji: "✅", cls: "card-green", iconCls: "icon-green" }
    : { emoji: "🔴", cls: "card-red",   iconCls: "icon-red" };
}

function renderChips() {
  const container = document.getElementById("dateChips");
  container.innerHTML = HISTORY.map((row, i) => {
    const d = parseDate(row.date);
    const label = `${d.getDate()} ${MONTHS[d.getMonth()]}`;
    return `<div class="chip ${i === selectedIdx ? "active" : ""}" onclick="selectDate(${i})">${label}</div>`;
  }).join("");
}

function renderHeader(row) {
  const d = parseDate(row.date);
  document.getElementById("hdrDate").textContent = row.date;
  document.getElementById("hdrWeekday").textContent = WEEKDAYS[d.getDay()];
}

function renderSummary(row) {
  const previews = row.previews || [];
  let ok = 0, fail = 0, pending = 0;
  KPIS.forEach(kpi => {
    const v = row[kpi.id];
    const isPending = (v === null || v === undefined) || (kpi.pendentIfZero && v === 0);
    if (isPending) { pending++; return; }
    (kpi.check(v) ? ok++ : fail++);
  });

  document.getElementById("summaryRow").innerHTML = `
    <div class="pill pill-green">✅ ${ok} na meta</div>
    <div class="pill pill-red">🔴 ${fail} fora da meta</div>
    <div class="pill pill-amber">⏳ ${pending} pendentes</div>
  `;
}

function renderCards(row) {
  const previews = row.previews || [];
  const sections = ["people", "profitability", "experience"];
  const sectionLabels = { people: "👥 People", profitability: "💰 Profitability", experience: "🚀 Experience" };

  let html = "";

  sections.forEach(sec => {
    const kpis = KPIS.filter(k => k.section === sec);
    html += `<div class="section-label">${sectionLabels[sec]}</div>`;

    if (sec === "profitability") {
      html += `<div class="cards-2col">`;
      kpis.forEach(kpi => {
        html += buildCard2col(kpi, row, previews);
      });
      html += `</div>`;
    } else if (sec === "experience") {
      kpis.forEach(kpi => {
        html += buildCard(kpi, row, previews);
      });
    } else {
      kpis.forEach(kpi => {
        html += buildCard(kpi, row, previews);
      });
    }
  });

  document.getElementById("content").innerHTML = html;
}

function buildCard(kpi, row, previews) {
  const v = row[kpi.id];
  const isPending = (v === null || v === undefined) || (kpi.pendentIfZero && v === 0);
  const isPreview = previews.includes(kpi.id);
  const isOk = !isPending && kpi.check(v);
  const st = cardStatus(isOk, isPending);

  const valHtml = isPending
    ? `<span class="card-value pending">—</span>`
    : `<span class="card-value">${kpi.fmt(v)}${isPreview ? '<span class="card-preview-tag">prévia</span>' : ""}</span>`;

  const metaText = isPending ? `${kpi.meta} &nbsp;·&nbsp; Pendente atualização` : kpi.meta;

  return `
    <div class="card ${st.cls}">
      <div class="card-icon ${st.iconCls}">${kpi.icon}</div>
      <div class="card-body">
        <div class="card-name">${kpi.name}</div>
        ${valHtml}
        <div class="card-meta">${metaText}</div>
      </div>
      <div class="card-status">${st.emoji}</div>
    </div>`;
}

function buildCard2col(kpi, row, previews) {
  const v = row[kpi.id];
  const isPending = (v === null || v === undefined) || (kpi.pendentIfZero && v === 0);
  const isPreview = previews.includes(kpi.id);
  const isOk = !isPending && kpi.check(v);
  const st = cardStatus(isOk, isPending);

  const valHtml = isPending
    ? `<span class="card-value pending">—</span>`
    : `<span class="card-value">${kpi.fmt(v)}${isPreview ? '<span class="card-preview-tag">prévia</span>' : ""}</span>`;

  return `
    <div class="card ${st.cls}">
      <div class="card-top">
        <div class="card-icon ${st.iconCls}">${kpi.icon}</div>
        <div class="card-status">${st.emoji}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${kpi.name}</div>
        ${valHtml}
        <div class="card-meta">${kpi.meta}</div>
      </div>
    </div>`;
}

function selectDate(idx) {
  selectedIdx = idx;
  const row = HISTORY[idx];
  renderChips();
  renderHeader(row);
  renderSummary(row);
  renderCards(row);
  // scroll chips into view
  const chips = document.querySelectorAll(".chip");
  if (chips[idx]) chips[idx].scrollIntoView({ inline: "center", behavior: "smooth" });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderChips();
selectDate(selectedIdx);
</script>
</body>
</html>
