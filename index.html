<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEROT UTR – Dashboard SMG1</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; font-size: 13px; }

  /* HEADER */
  .header {
    background: #FFE600;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #d4c000;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 22px; font-weight: 900; color: #333; }
  .title { font-size: 15px; font-weight: 700; color: #333; }
  .subtitle { font-size: 11px; color: #555; }
  .date-selector { display: flex; align-items: center; gap: 8px; }
  .date-selector label { font-weight: 600; font-size: 12px; color: #333; }
  .date-selector select {
    padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 12px; background: #fff; cursor: pointer;
  }

  /* SUMMARY BAR */
  .summary-bar {
    display: flex; gap: 8px; padding: 6px 16px; background: #fff;
    border-bottom: 1px solid #e0e0e0; align-items: center;
  }
  .summary-chip {
    padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 700;
  }
  .chip-meta { background: #e8f5e9; color: #2e7d32; }
  .chip-fora { background: #ffebee; color: #c62828; }
  .chip-pend { background: #fff3e0; color: #e65100; }
  .summary-label { font-size: 11px; color: #666; margin-left: 4px; }

  /* SECTIONS */
  .section { padding: 6px 16px 4px; }
  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    color: #666; letter-spacing: 1px; margin-bottom: 6px; padding-left: 4px;
    border-left: 3px solid #FFE600;
  }

  /* CARDS GRID */
  .cards-row { display: flex; gap: 8px; flex-wrap: nowrap; }
  .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  /* CARD */
  .card {
    background: #fff; border-radius: 8px; padding: 10px 12px;
    border-left: 4px solid #ccc;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    position: relative; min-width: 0;
    flex: 1;
  }
  .card.meta { border-left-color: #2e7d32; }
  .card.fora { border-left-color: #c62828; }
  .card.pendente { border-left-color: #e65100; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .card-name { font-weight: 700; font-size: 12px; color: #333; line-height: 1.3; max-width: 70%; }
  .status-chip {
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px;
    white-space: nowrap;
  }
  .chip-meta-sm { background: #e8f5e9; color: #2e7d32; }
  .chip-fora-sm { background: #ffebee; color: #c62828; }
  .chip-pend-sm { background: #fff3e0; color: #e65100; }

  .card-value { font-size: 22px; font-weight: 900; color: #222; line-height: 1.1; }
  .card-value.fora-color { color: #c62828; }
  .card-value.meta-color { color: #2e7d32; }
  .card-value.pend-color { color: #e65100; font-size: 14px; font-weight: 700; }

  .card-meta-info { font-size: 10px; color: #888; margin-top: 3px; }
  .previa-tag {
    display: inline-block; background: #FFE600; color: #333;
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 4px; margin-left: 4px;
  }

  /* WIDE CARD */
  .card-wide { flex: 1; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">🟡 MELI</div>
    <div>
      <div class="title">GEROT UTR – Gestão da Rotina</div>
      <div class="subtitle">Site: SMG1 &nbsp;|&nbsp; Atualização: 09/06/2026</div>
    </div>
  </div>
  <div class="date-selector">
    <label>📅 Data:</label>
    <select id="dateSel" onchange="loadDate(this.value)"></select>
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar" id="summaryBar"></div>

<!-- PEOPLE -->
<div class="section">
  <div class="section-title">👤 People</div>
  <div class="cards-row">
    <div class="card card-wide" id="card-abs"></div>
  </div>
</div>

<!-- PROFITABILITY -->
<div class="section">
  <div class="section-title">💰 Profitability</div>
  <div class="cards-row">
    <div class="card" id="card-lms"></div>
    <div class="card" id="card-cia"></div>
    <div class="card" id="card-coa"></div>
    <div class="card" id="card-spr"></div>
  </div>
</div>

<!-- EXPERIENCE -->
<div class="section">
  <div class="section-title">⭐ Experience</div>
  <div class="cards-grid">
    <div class="card" id="card-dit"></div>
    <div class="card" id="card-delay"></div>
    <div class="card" id="card-tmc"></div>
    <div class="card" id="card-delivery"></div>
    <div class="card" id="card-fag"></div>
    <div class="card" id="card-oot"></div>
  </div>
</div>

<script>
// ── HISTÓRICO ──────────────────────────────────────────────────────────
const HISTORICO = {
  "31/05/2026": { abs:16.98, lms:76.84, cia:15.38, coa:10.39, spr:80.39, delay:null,  tmc:45.77, delivery:88.71, fag:58.67, oot:80.17,  dit:741  },
  "01/06/2026": { abs:9.89,  lms:82.24, cia:10.40, coa:6.49,  spr:65.58, delay:33.33, tmc:45.57, delivery:95.35, fag:49.13, oot:60.95,  dit:889  },
  "02/06/2026": { abs:9.50,  lms:66.51, cia:5.39,  coa:6.50,  spr:53.78, delay:3.86,  tmc:67.23, delivery:null,  fag:78.91, oot:74.33,  dit:628  },
  "03/06/2026": { abs:10.65, lms:82.76, cia:3.21,  coa:3.74,  spr:64.62, delay:null,  tmc:57.35, delivery:95.25, fag:81.01, oot:77.75,  dit:null },
  "04/06/2026": { abs:13.04, lms:65.20, cia:1.45,  coa:1.65,  spr:65.97, delay:7.17,  tmc:56.44, delivery:88.42, fag:38.58, oot:79.35,  dit:null },
  "07/06/2026": { abs:16.13, lms:76.10, cia:14.29, coa:1.43,  spr:87.89, delay:3.70,  tmc:89.99, delivery:74.65, fag:90.33, oot:null,   dit:782  },
  "08/06/2026": { abs:6.50,  lms:86.29, cia:6.12,  coa:3.19,  spr:61.12, delay:null,  tmc:42.60, delivery:93.66, fag:57.60, oot:65.28,  dit:932  }
};

// ── METAS & CONFIG ─────────────────────────────────────────────────────
const CONFIG = [
  { id:"abs",      label:"Absenteísmo Absoluto",      meta:"≤ 4%",    fmt:"%",  previa:true,  check:(v)=>v<=4,      higher:false },
  { id:"lms",      label:"% Utilização LMS",           meta:"≥ 80%",   fmt:"%",  previa:false, check:(v)=>v>=80,     higher:true  },
  { id:"cia",      label:"%CIA",                       meta:"≤ 5%",    fmt:"%",  previa:false, check:(v)=>v<=5,      higher:false },
  { id:"coa",      label:"%COA",                       meta:"≤ 5%",    fmt:"%",  previa:false, check:(v)=>v<=5,      higher:false },
  { id:"spr",      label:"SPR LM",                     meta:"≥ 67,58", fmt:"",   previa:false, check:(v)=>v>=67.58,  higher:true  },
  { id:"dit",      label:"DIT – Pacotes Acum. SVC",    meta:"< 500",   fmt:"",   previa:false, check:(v)=>v<500,     higher:false },
  { id:"delay",    label:"Delay (Cause SVC)",           meta:"≤ 4%",    fmt:"%",  previa:false, check:(v)=>v<=4&&v>0, higher:false },
  { id:"tmc",      label:"TMC (% Cumprimento Temp.)",  meta:"≥ 83%",   fmt:"%",  previa:false, check:(v)=>v>=83,     higher:true  },
  { id:"delivery", label:"Delivery Success",            meta:"≥ 98,1%", fmt:"%",  previa:false, check:(v)=>v>=98.1,   higher:true  },
  { id:"fag",      label:"Fechamento Automático",       meta:"≥ 70%",   fmt:"%",  previa:false, check:(v)=>v>=70,     higher:true  },
  { id:"oot",      label:"OOT Waves 3.0",               meta:"≥ 85%",   fmt:"%",  previa:false, check:(v)=>v>=85,     higher:true  }
];

// ── PREVIAS ────────────────────────────────────────────────────────────
// Campos que eram prévia em 08/06/2026
const PREVIAS_08 = { abs: true };

// ── HELPERS ────────────────────────────────────────────────────────────
function fmt(v, f) {
  if (v===null||v===undefined) return "—";
  if (f==="%") return v.toFixed(2).replace(".",",") + "%";
  if (f==="") return v % 1 === 0 ? String(v) : v.toFixed(2).replace(".",",");
  return String(v);
}

function getStatus(cfg, v, date) {
  if (v===null||v===undefined) return "pendente";
  if (cfg.id==="delay" && (v===0||v===null)) return "pendente";
  return cfg.check(v) ? "meta" : "fora";
}

function renderCard(cfg, data, date) {
  const v = data[cfg.id];
  const isDelay = cfg.id==="delay";
  const effectiveV = (isDelay && v===0) ? null : v;
  const status = getStatus(cfg, effectiveV, date);
  const el = document.getElementById("card-" + cfg.id);

  const isPrev = cfg.id==="abs" && date==="08/06/2026" && PREVIAS_08.abs;

  let chipClass = status==="meta" ? "chip-meta-sm" : (status==="fora" ? "chip-fora-sm" : "chip-pend-sm");
  let chipLabel = status==="meta" ? "Na Meta" : (status==="fora" ? "Fora da Meta" : "Pendente");
  let valClass  = status==="meta" ? "meta-color" : (status==="fora" ? "fora-color" : "pend-color");
  let cardClass = status;

  el.className = "card " + cardClass;

  let valueStr = status==="pendente" ? "Pendente" : fmt(effectiveV, cfg.fmt);
  let prevTag  = (isPrev && status!=="pendente") ? '<span class="previa-tag">(prévia)</span>' : "";

  el.innerHTML = `
    <div class="card-header">
      <div class="card-name">${cfg.label}</div>
      <span class="status-chip ${chipClass}">${chipLabel}</span>
    </div>
    <div class="card-value ${valClass}">${valueStr}${prevTag}</div>
    <div class="card-meta-info">Meta: ${cfg.meta}</div>
  `;
}

function countStatus(data, date) {
  let meta=0, fora=0, pend=0;
  CONFIG.forEach(cfg => {
    const v = data[cfg.id];
    const isDelay = cfg.id==="delay";
    const ev = (isDelay && v===0) ? null : v;
    const s = getStatus(cfg, ev, date);
    if (s==="meta") meta++;
    else if (s==="fora") fora++;
    else pend++;
  });
  return {meta,fora,pend};
}

function renderSummary(data, date) {
  const {meta,fora,pend} = countStatus(data, date);
  const bar = document.getElementById("summaryBar");
  bar.innerHTML = `
    <span class="summary-chip chip-meta">✅ Na Meta: ${meta}</span>
    <span class="summary-chip chip-fora">❌ Fora da Meta: ${fora}</span>
    <span class="summary-chip chip-pend">⏳ Pendente: ${pend}</span>
    <span class="summary-label">Total: ${CONFIG.length} indicadores</span>
  `;
}

function loadDate(date) {
  const data = HISTORICO[date] || {};
  CONFIG.forEach(cfg => renderCard(cfg, data, date));
  renderSummary(data, date);
}

// ── POPULATE DATE SELECTOR ─────────────────────────────────────────────
function init() {
  const sel = document.getElementById("dateSel");
  const dates = Object.keys(HISTORICO).reverse();
  dates.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
  sel.value = "08/06/2026";
  loadDate("08/06/2026");
}

init();
</script>
</body>
</html>
