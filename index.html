<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEROT UTR SMG1 – Dashboard Diário</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: #f4f5f7; font-size: 13px; }

  /* HEADER */
  .header { background: #FFE600; padding: 10px 18px; display: flex; align-items: center; gap: 14px; border-bottom: 3px solid #d4c000; }
  .header-logo { width: 44px; height: 44px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; color: #333; text-align: center; line-height: 1.2; border: 2px solid #d4c000; }
  .header-title { flex: 1; }
  .header-title h1 { font-size: 17px; font-weight: 800; color: #1a1a1a; }
  .header-title p { font-size: 11px; color: #555; margin-top: 2px; }
  .date-selector { display: flex; align-items: center; gap: 6px; }
  .date-selector label { font-size: 11px; font-weight: 600; color: #333; }
  .date-selector select { padding: 4px 8px; border: 1.5px solid #bbb; border-radius: 6px; font-size: 12px; background: #fff; cursor: pointer; }

  /* SUMMARY BAR */
  .summary-bar { display: flex; gap: 10px; padding: 8px 18px; background: #fff; border-bottom: 1px solid #e0e0e0; }
  .summary-pill { display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .pill-green  { background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7; }
  .pill-red    { background: #ffebee; color: #c62828; border: 1.5px solid #ef9a9a; }
  .pill-orange { background: #fff3e0; color: #e65100; border: 1.5px solid #ffcc80; }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green  { background: #2e7d32; }
  .dot-red    { background: #c62828; }
  .dot-orange { background: #e65100; }

  /* SECTIONS */
  .sections { padding: 8px 18px 10px; display: flex; flex-direction: column; gap: 8px; }
  .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #888; margin-bottom: 5px; }
  .cards-row { display: flex; gap: 8px; }
  .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 10px 12px;
    border-left: 4px solid #ccc;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    position: relative;
    flex: 1;
    min-width: 0;
  }
  .card.meta    { border-left-color: #2e7d32; }
  .card.fora    { border-left-color: #c62828; }
  .card.pendente{ border-left-color: #e65100; }

  .card-chip {
    position: absolute;
    top: 7px; right: 8px;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .chip-meta    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .chip-fora    { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
  .chip-pendente{ background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }

  .card-name { font-weight: 700; font-size: 11.5px; color: #333; margin-bottom: 4px; padding-right: 60px; line-height: 1.3; }
  .card-value { font-size: 22px; font-weight: 800; color: #111; line-height: 1; }
  .card-value.pending-val { font-size: 16px; color: #e65100; }
  .card-meta-text { font-size: 10px; color: #888; margin-top: 3px; }
  .preview-tag { display: inline-block; font-size: 9px; background: #FFE600; color: #333; border-radius: 4px; padding: 1px 5px; font-weight: 700; margin-left: 4px; vertical-align: middle; }

  /* Full-width card for People */
  .card-full { width: 100%; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">GEROT<br>UTR</div>
  <div class="header-title">
    <h1>Dashboard Diário – SMG1</h1>
    <p>Gestão da Rotina UTR · Atualizado em: 10/06/2026</p>
  </div>
  <div class="date-selector">
    <label>Data:</label>
    <select id="datePicker" onchange="renderDashboard(this.value)"></select>
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar" id="summaryBar"></div>

<!-- SECTIONS -->
<div class="sections" id="sections"></div>

<script>
// ─── HISTÓRICO ────────────────────────────────────────────────────────────────
const HISTORICO = {
  "31/05/2026": { abs:16.98, lms:76.84, cia:15.38, coa:10.39, spr:80.39, delay:null,  tmc:45.77, delivery:88.71, fag:58.67, oot:80.17, dit:741  },
  "01/06/2026": { abs:9.89,  lms:82.24, cia:10.40, coa:6.49,  spr:65.58, delay:33.33, tmc:45.57, delivery:95.35, fag:49.13, oot:60.95, dit:889  },
  "02/06/2026": { abs:9.50,  lms:66.51, cia:5.39,  coa:6.50,  spr:53.78, delay:3.86,  tmc:67.23, delivery:null,  fag:78.91, oot:74.33, dit:628  },
  "03/06/2026": { abs:10.65, lms:82.76, cia:3.21,  coa:3.74,  spr:64.62, delay:null,  tmc:57.35, delivery:95.25, fag:81.01, oot:77.75, dit:null },
  "04/06/2026": { abs:13.04, lms:65.20, cia:1.45,  coa:1.65,  spr:65.97, delay:7.17,  tmc:56.44, delivery:88.42, fag:38.58, oot:79.35, dit:null },
  "07/06/2026": { abs:16.13, lms:76.10, cia:14.29, coa:1.43,  spr:87.89, delay:3.70,  tmc:89.99, delivery:74.65, fag:90.33, oot:null,  dit:782  },
  "08/06/2026": { abs:6.50,  lms:84.20, cia:11.93, coa:7.02,  spr:61.12, delay:2.81,  tmc:42.60, delivery:93.66, fag:57.60, oot:65.28, dit:932  },
  "09/06/2026": { abs:10.38, lms:86.51, cia:2.23,  coa:1.11,  spr:63.79, delay:3.90,  tmc:57.27, delivery:92.64, fag:69.27, oot:59.02, dit:724  }
};

// ─── METAS & CONFIG ───────────────────────────────────────────────────────────
const CONFIG = [
  // People
  { key:'abs',      label:'Absenteísmo Absoluto',       meta:'≤ 4%',     fmt:v=>`${v.toFixed(2)}%`, check:v=> v<=4,    section:'people'      },
  // Profitability
  { key:'lms',      label:'% Utilização LMS',            meta:'≥ 80%',    fmt:v=>`${v.toFixed(2)}%`, check:v=> v>=80,   section:'profitability'},
  { key:'cia',      label:'%CIA',                        meta:'≤ 5%',     fmt:v=>`${v.toFixed(2)}%`, check:v=> v<=5,    section:'profitability'},
  { key:'coa',      label:'%COA',                        meta:'≤ 5%',     fmt:v=>`${v.toFixed(2)}%`, check:v=> v<=5,    section:'profitability'},
  { key:'spr',      label:'SPR LM',                      meta:'≥ 67,58',  fmt:v=>`${v.toFixed(2)}`,  check:v=> v>=67.58,section:'profitability'},
  // Experience
  { key:'dit',      label:'DIT – Pacotes Acum. SVC',     meta:'< 500 pcts',fmt:v=>`${v} pcts`,       check:v=> v<500,   section:'experience'  },
  { key:'delay',    label:'Delay (Cause SVC)',            meta:'≤ 4%',     fmt:v=>`${v.toFixed(2)}%`, check:v=> v<=4 && v>0, section:'experience'},
  { key:'tmc',      label:'TMC (% Cumprimento Temp.)',   meta:'≥ 83%',    fmt:v=>`${v.toFixed(2)}%`, check:v=> v>=83,   section:'experience'  },
  { key:'delivery', label:'Delivery Success',            meta:'≥ 98,1%',  fmt:v=>`${v.toFixed(2)}%`, check:v=> v>=98.1, section:'experience'  },
  { key:'fag',      label:'Fechamento Automático',       meta:'≥ 70%',    fmt:v=>`${v.toFixed(2)}%`, check:v=> v>=70,   section:'experience'  },
  { key:'oot',      label:'OOT Waves 3.0',               meta:'≥ 85%',    fmt:v=>`${v.toFixed(2)}%`, check:v=> v>=85,   section:'experience'  }
];

// Keys coming from spreadsheet (not Tableau) — never show "prévia" tag
const SPREADSHEET_KEYS = ['dit', 'delay'];

function getStatus(cfg, value) {
  if (value === null || value === undefined) return 'pendente';
  if (cfg.key === 'delay' && value === 0) return 'pendente';
  return cfg.check(value) ? 'meta' : 'fora';
}

function renderCard(cfg, value, isPreview) {
  const status = getStatus(cfg, value);
  const chipClass  = {meta:'chip-meta', fora:'chip-fora', pendente:'chip-pendente'}[status];
  const cardClass  = {meta:'meta',      fora:'fora',      pendente:'pendente'}[status];
  const chipLabel  = {meta:'Na Meta',   fora:'Fora da Meta', pendente:'Pendente'}[status];
  const showPreview = isPreview && !SPREADSHEET_KEYS.includes(cfg.key);

  let valueHtml;
  if (status === 'pendente') {
    valueHtml = `<div class="card-value pending-val">Pendente</div>`;
  } else {
    const formatted = cfg.fmt(value);
    valueHtml = `<div class="card-value">${formatted}${showPreview ? '<span class="preview-tag">prévia</span>' : ''}</div>`;
  }

  return `
  <div class="card ${cardClass}${cfg.section==='people' ? ' card-full' : ''}">
    <span class="card-chip ${chipClass}">${chipLabel}</span>
    <div class="card-name">${cfg.label}</div>
    ${valueHtml}
    <div class="card-meta-text">Meta: ${cfg.meta}</div>
  </div>`;
}

function renderDashboard(dateKey) {
  const data = HISTORICO[dateKey];
  if (!data) return;

  // Count statuses
  let nMeta=0, nFora=0, nPend=0;
  CONFIG.forEach(cfg => {
    const v = data[cfg.key];
    const st = getStatus(cfg, v);
    if (st==='meta') nMeta++;
    else if (st==='fora') nFora++;
    else nPend++;
  });

  // Summary bar
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-pill pill-green"><span class="pill-dot dot-green"></span>Na Meta: ${nMeta}</div>
    <div class="summary-pill pill-red"><span class="pill-dot dot-red"></span>Fora da Meta: ${nFora}</div>
    <div class="summary-pill pill-orange"><span class="pill-dot dot-orange"></span>Pendente: ${nPend}</div>
    <div style="margin-left:auto;font-size:11px;color:#888;align-self:center;">Data: <strong>${dateKey}</strong></div>`;

  // Sections
  const peopleCfg       = CONFIG.filter(c=>c.section==='people');
  const profitCfg       = CONFIG.filter(c=>c.section==='profitability');
  const expCfg          = CONFIG.filter(c=>c.section==='experience');

  const peopleCards     = peopleCfg.map(c=>renderCard(c, data[c.key], false)).join('');
  const profitCards     = profitCfg.map(c=>renderCard(c, data[c.key], false)).join('');
  const expCards        = expCfg.map(c=>renderCard(c, data[c.key], false)).join('');

  document.getElementById('sections').innerHTML = `
    <div>
      <div class="section-label">👥 People</div>
      <div class="cards-row">${peopleCards}</div>
    </div>
    <div>
      <div class="section-label">💰 Profitability</div>
      <div class="cards-row">${profitCards}</div>
    </div>
    <div>
      <div class="section-label">⭐ Experience</div>
      <div class="cards-grid">${expCards}</div>
    </div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init() {
  const picker = document.getElementById('datePicker');
  const dates  = Object.keys(HISTORICO).reverse();
  dates.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    picker.appendChild(opt);
  });
  picker.value = dates[0]; // most recent
  renderDashboard(dates[0]);
})();
</script>
</body>
</html>
